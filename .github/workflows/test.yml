name: Tests

# Run the unit tests on every push and PR so a regression in the fragile parsing
# (vocab JSON, supervisor delimiter, slug/vocab logic) is caught before it can
# break the next morning's scheduled brief.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q
